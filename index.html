<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonnette - Salle de Sport</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #doorbell-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: #00ff41;
            color: #1a1a1a;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            text-transform: uppercase;
        }

        #doorbell-button:active {
            transform: scale(0.90);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }

        #doorbell-button:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        .status {
            margin-top: 2rem;
            font-size: 1rem;
            min-height: 1.2rem;
            color: #00ff41;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sonnette CTTV</h1>
        
        <button id="doorbell-button">
            <span class="icon">🔔</span>
            <span>Sonner</span>
        </button>

        <p id="status-message" class="status"></p>
    </div>

    <script>
        const btn = document.getElementById('doorbell-button');
        const statusMsg = document.getElementById('status-message');

        btn.addEventListener('click', function() {
            // Désactiver le bouton temporairement
            btn.disabled = true;
            statusMsg.innerText = "Appel en cours...";

            // Configuration de l'appel Shelly
            const url = 'https://shelly-245-eu.shelly.cloud/device/relay/control';
            const bodyData = 'channel=0&turn=on&id=ccba97c6a44c&auth_key=M2VlNWVidWlk6B941DA241F263EFB95572998FF619ADECE17D81D1E78B69AC693EF061CD6CF8BB35AF261FD7682E';

            fetch(url, {
                method: 'POST',
                mode: 'no-cors', // Évite les erreurs de sécurité CORS
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: bodyData
            })
            .then(() => {
                // Avec 'no-cors', on ne peut pas lire la réponse, mais l'ordre est parti !
                statusMsg.innerText = "✅ Demande envoyée !";
                statusMsg.style.color = "#00ff41";
                
                // Réactivation après 5 secondes pour éviter le spam
                setTimeout(() => {
                    btn.disabled = false;
                    statusMsg.innerText = "";
                }, 5000);
            })
            .catch(error => {
                statusMsg.innerText = "❌ Erreur de connexion";
                statusMsg.style.color = "#ff4444";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
